<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project03</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .main {
            position: relative;

        }

        .main_img {
            display: block;
            width: 100%;
            height: auto;
        }

        .obj {
            position: absolute;
            top: 430px;
            left: 530px;
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .obj {
                position: absolute;
                top: 110px;
                left: 130px;
                animation: floating 4s ease-in-out infinite;
                width: 100px;
            }
        }
    </style>
</head>

<body>
    <div class="main">
        <img src="./img/obj.png" alt="" class="obj">
        <img src="./img/oct_01.jpg" alt="" class="main_img">
        <img src="./img/oct_02.gif" alt="" class="main_img">
        <img src="./img/oct_03.jpg" alt="" class="main_img">
    </div>

    <script>
        if (window.innerWidth > 768) {
            // 900px 스크롤 적용
            let isScrolling = false;

            window.addEventListener('wheel', (e) => {
                e.preventDefault();

                if (isScrolling) return;
                isScrolling = true;

                const move = e.deltaY > 0 ? 900 : -900;

                window.scrollBy({
                    top: move,
                    behavior: 'smooth'
                });

                setTimeout(() => {
                    isScrolling = false;
                }, 500);
            }, { passive: false });
        }
    </script>
</body>

</html>
